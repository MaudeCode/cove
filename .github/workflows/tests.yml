name: Tests

on:
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit Tests
    uses: ./.github/workflows/test-unit.yml

  integration:
    name: Integration Tests
    uses: ./.github/workflows/test-integration.yml

  deployment:
    name: Docker Runtime Smoke
    uses: ./.github/workflows/test-deployment.yml

  e2e:
    name: E2E Tests
    uses: ./.github/workflows/test-e2e.yml
